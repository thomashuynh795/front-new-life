services:
  db:
    image: postgres:16-alpine
    container_name: anti_counterfeit_database
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: anti_counterfeit_database
    ports:
      - "8100:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
