services:
  db:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-front_new_life_database}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-front_new_life_database}
    ports:
      - "${POSTGRES_PORT:-8100}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
